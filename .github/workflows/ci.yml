name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc g++

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build
        run: cmake --build build
